<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Blog preview card</title>

  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <main>
    <div class="card">
      <div class="image-container">
        <img src="./assets/images/illustration-article.svg" alt="Illustration of an article">
      </div>
      <div class="content">
        <p class="category">Learning</p>
        <p class="date">Published 21 Dec 2023</p>
        <h4>HTML & CSS foundations</h4>
        <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
        <div class="author">
          <img src="./assets/images/image-avatar.webp" alt="Avatar of Greg Hooper">
          <span class="name">Greg Hooper</span>
        </div>
      </div>
    </div>
  </main>

 
</body>
</html>
